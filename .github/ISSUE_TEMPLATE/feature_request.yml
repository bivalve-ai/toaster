name: Feature request
description: Suggest an improvement or new adapter
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Toaster cannot do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful version of the feature.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TOAST spec
        - adapter
        - ingest/library
        - resume/translate
        - redaction/mirror
        - CLI UX
        - docs
        - other
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: Agent or native format, if relevant
      placeholder: "aider, Cursor, Gemini CLI, ..."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link public docs or describe the native session shape. Do not paste private session data.
    validations:
      required: false
